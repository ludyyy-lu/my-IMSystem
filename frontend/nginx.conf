server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so clients always pick up latest asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets must return 404 when missing; do not fall back to index.html.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /favicon.svg {
        try_files $uri =404;
    }

    # SPA: serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to api-gateway
    location /api/ {
        proxy_pass http://api-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket to ws-gateway
    location /ws/ {
        proxy_pass http://ws-gateway:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
