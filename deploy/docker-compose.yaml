services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: im
      MYSQL_USER: goxygen            
      MYSQL_PASSWORD: pass 
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    restart: always

  redis:
    image: redis:7
    container_name: im-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    restart: always

  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: im-etcd
    command:
      - /usr/local/bin/etcd
      - --name=im-etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=im-etcd=http://0.0.0.0:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=im-etcd-cluster
    ports:
      - "2379:2379"
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: im-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: im-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    depends_on:
      - zookeeper
    restart: always

  # HTTP REST API gateway — bridges browser/frontend ↔ gRPC microservices
  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api-gateway
    container_name: im-api-gateway
    ports:
      - "8090:8090"
    depends_on:
      - etcd
      - mysql
      - redis
    restart: always

  # React frontend served by nginx
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: im-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: always

